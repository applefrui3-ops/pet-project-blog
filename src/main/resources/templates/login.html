<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin-layout :: head(Admin)}">
    <title>Вход для админа</title>
</head>
    <body class="d-flex flex-column min-vh-100" data-page="admin">
        <header th:replace="~{layouts/admin-layout :: header}"></header>

        <main class="container my-auto flex-grow-1 d-flex align-items-center">
            <div class="row justify-content-center w-100">
                <div class="col-md-6 col-lg-5 col-xl-4">

                    <div class="text-center mb-4">
                        <h1 class="h3" th:text="#{login.h1}">Admin Panel Login</h1>
                        <p class="text-muted" th:text="#{login.text1}">Enter your credentials</p>
                    </div>

                    <div class="card border-0 shadow-lg">
                        <div class="card-body p-4 p-xl-5">

                            <form method="post" th:action="@{/login}">

                                <div class="mb-3">
                                    <label for="username" class="form-label" th:text="#{login.form.field1}">Username</label>
                                    <div class="input-group">
                                            <span class="input-group-text">
                                                <i class="bi bi-person"></i>
                                            </span>
                                        <input type="text"
                                               class="form-control"
                                               id="username"
                                               name="username"
                                               placeholder="Enter username"
                                               required
                                               autofocus
                                               th:placeholder="#{login.form.placeholder1}">
                                    </div>
                                </div>


                                <div class="mb-4">
                                    <label for="password" class="form-label" th:text="#{login.form.field2}">Password</label>
                                    <div class="input-group">
                                            <span class="input-group-text">
                                                <i class="bi bi-lock"></i>
                                            </span>
                                        <input type="password"
                                               class="form-control"
                                               id="password"
                                               name="password"
                                               placeholder="Enter password"
                                               required
                                               th:placeholder="#{login.form.placeholder2}">
                                    </div>
                                </div>

                                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                    <div th:text="#{login.form.error.message}">Invalid username or password</div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg" th:utext="#{login.form.submit}">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>
                                        Sign In
                                    </button>
                                </div>
                            </form>

                            <div class="text-center mt-4">
                                <a th:href="@{/}" class="text-decoration-none" th:utext="#{login.button.back}">
                                    <i class="bi bi-arrow-left me-1"></i>
                                    Back to Home
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{layouts/admin-layout :: footer}"></footer>


        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </body>
</html>
